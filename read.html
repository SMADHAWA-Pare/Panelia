<!DOCTYPE html>
<html>
<head>
  <title>Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">⬅ Back</a>
</header>

<div id="content" class="reader"></div>

<script src="data.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id");
const manga = mangaData.find(m => m.id === id);

let currentChapter = 0;

function renderChapter(){
  const ch = manga.chapters[currentChapter];

  document.getElementById("content").innerHTML = `
    <h2>${manga.title} - Chapter ${ch.chapter}</h2>
    ${ch.pages.map(p => `<img src="${p}">`).join("")}
    <button onclick="next()">Next Chapter</button>
  `;
}

function next(){
  if(currentChapter < manga.chapters.length - 1){
    currentChapter++;
    renderChapter();
  } else {
    alert("Last chapter");
  }
}

renderChapter();
</script>

</body>
</html>
